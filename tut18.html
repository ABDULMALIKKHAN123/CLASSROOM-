<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color in CSS </title>
    <link rel="stylesheet" href="tut18.css">
    <style>
        #secondbox{
            color: rgb(38, 38, 192);   /* color by rgb value*/
        }
        #thirdbox{
            color: #00ff00;    /* color by hex value */
        }
    </style>
</head>
<body>
    <h2>This is my first box</h2>
    <p>This is a paragraph from first box</p>

    <h2>This is my second box</h2>
    <p id="secondbox">This is a paragraph from second box</p>


    <h2>This is my third box</h2>
    <p id="thirdbox">This is a paragraph from third box</p>





</body>
</html>
