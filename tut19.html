<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height,width,borders and backgrounds</title>
    <link rel="stylesheet" href="tut19.css">
    <style>
        #secondpara{
            background-color: violet;
            background-image: url(https://yt3.googleusercontent.com/DMkHt_qzZQWF5aqtmhSf1bxe_pLxDoOkNJqNQ7K_QKjfC7XzHBGU70ZGKeOOWbblYV5N9mI3=s160-c-k-c0x00ffffff-no-rj);
            height: 500px;
            width: 500px;
            border-top: 3px solid black;
            border-right: 4px solid aqua;
            border-bottom: 5px solid rebeccapurple;
            border-left: 6px solid blue;
            border-top-left-radius: 10px;
            border-bottom-right-radius: 20px;
            background-repeat: no-repeat; /* repeat-x and repeat-y will make it repeat on x and y axis*/
            background-position: center;
            /* background-position: top right; */

        }
    </style>
</head>
<body>
    <h3>This is a heading</h3>
    <p>This is a paragraph</p>
    
 <h3>This is a heading</h3>
    <p id="secondpara">This is a paragraph</p>

</body>
</html>
