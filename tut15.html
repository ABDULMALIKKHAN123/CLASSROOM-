<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTOR</title>
   
     <style>
          /* element selector*/
         p{
            border: 2px solid black;
         }

        
         /*id selector*/
        #secondpara{
            color: red;
            background-color: black;
        }

         /* grouping selector*/
        footer,span{
            background-color: pink;
        }
        
     </style>
</head>
<body>
    
<h3>CSS Selectors</h3>
<p>This is a simple paragraph selector</p>
<p id="secondpara">This is another simple paragraph selector</p>

<div>
    <p>This is yet another simple paragraph selector</p>
    <span>this is span</span>
</div>


<footer>This is a footer</footer>



</body>
</html>
